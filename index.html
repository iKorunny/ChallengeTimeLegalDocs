<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Documents - ChallengeTime</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { text-align: center; padding-top: 50px; }
        .container { max-width: 600px; margin: 0 auto; }
        .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        a.button { display: block; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">ChallengeTime</h1>
        <p id="subtitle">Legal Documents / Юридические документы</p>

        <div class="links">
            <a href="./en/privacy.html" id="privacyBtn" class="button">Privacy Policy</a>
            <a href="./en/terms.html" id="termsBtn" class="button">Terms of Use</a>
        </div>
    </div>

    <script>
        // Определяем язык пользователя
        var userLang = navigator.language || navigator.userLanguage; 
        if (userLang.includes('ru')) {
            // Меняем текст и ссылки на русские, если язык RU
            document.getElementById('title').innerText = "ChallengeTime";
            document.getElementById('subtitle').innerText = "Юридические документы";
            
            var pBtn = document.getElementById('privacyBtn');
            pBtn.innerText = "Политика конфиденциальности";
            pBtn.href = "./ru/privacy.html";
            
            var tBtn = document.getElementById('termsBtn');
            tBtn.innerText = "Условия использования";
            tBtn.href = "./ru/terms.html";
        }
    </script>
</body>
</html>
